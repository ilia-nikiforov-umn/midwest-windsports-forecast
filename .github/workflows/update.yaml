on:
    workflow_dispatch:
    push:
    schedule:
        - cron: "10,25,40,55 * * * *"

jobs:
    update:
        runs-on: ubuntu-latest

        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: Set up micromamba
              uses: mamba-org/setup-micromamba@v1.9.0
              with:
                environment-name: openmeteo
                cache-environment: true
                create-args: >-
                  -f environment.yml
            - name: Install retry-requests
              shell: bash -el {0}
              run: python -m pip install retry-requests
            - name: run-and-push
              shell: bash -el {0}
              run: |
                echo "${{ secrets.GITHUB_TOKEN }}" > token.txt
                gh auth login --with-token < token.txt
                gh auth setup-git
                
                # Setup the committers identity.
                git config user.email "nikif002@gmail.com"
                git config user.name "ilia's robot"

                python query.py
                git commit -am "update"
                git push
